[SERVICE]
    Flush            5
    Log_Level        info
    Parsers_File     /etc/fluent-bit/parsers.conf
    HTTP_Server      Off

[INPUT]
    Name             tail
    Tag              app.logs
    Path             /app/logs/*.log
    Parser           json
    DB               /tmp/flb_tail.db
    Refresh_Interval 5
    Mem_Buf_Limit    10MB
    Skip_Long_Lines  On
    Read_from_Head   False

[FILTER]
    Name             grep
    Match            *
    Regex            level ^(error|critical)$

[OUTPUT]
    Name             http
    Match            *
    Host             ${HTTP_OUTPUT_HOST}
    Port             ${HTTP_OUTPUT_PORT}
    URI              ${HTTP_OUTPUT_URI}
    Header           Authorization Bearer ${INGEST_KEY}
    Format           json
    Json_date_key    @timestamp
    Json_date_format iso8601
    Retry_Limit      3
    tls              ${HTTP_OUTPUT_TLS}
